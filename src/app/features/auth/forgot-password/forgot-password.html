<div class="forgot-wrapper">
  <!-- Background particles -->
  <div class="particles-container">
    @for (p of [0,1,2,3,4,5,6,7]; track p) {
      <span class="particle"></span>
    }
  </div>
  <div class="bg-wave"></div>

  <div class="card-section">
    <div class="forgot-card" [@fadeSlide]>
      <div class="card-shimmer"></div>

      <!-- Back button -->
      <button class="back-btn" type="button" (click)="goToLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to Login
      </button>

      <!-- Icon -->
      <div class="icon-container">
        <div class="icon-circle">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <div class="card-header">
        <h2 class="card-title">Forgot Password?</h2>
        <p class="card-subtitle">
          Enter your email address and we'll send you a reset code.
        </p>
      </div>

      @if (!submitted()) {
        <form class="forgot-form" (ngSubmit)="onSubmit()" novalidate>

          <!-- Email -->
          <div
            class="form-group"
            [class.focused]="emailFocused()"
            [class.error]="emailError()"
          >
            <label class="form-label" for="email">Email Address</label>
            <div class="input-wrapper">
              <div class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </div>
              <input
                id="email"
                type="email"
                class="form-input"
                placeholder="admin&#64;badilni.com"
                [(ngModel)]="email"
                name="email"
                required
                (focus)="emailFocused.set(true)"
                (blur)="onEmailBlur()"
                autocomplete="email"
              />
              <div class="input-focus-line"></div>
            </div>
            @if (emailError()) {
              <span class="error-message">{{ emailError() }}</span>
            }
          </div>

          <!-- Error alert -->
          @if (errorMessage()) {
            <div class="alert-error" [@alertAnimation]>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ errorMessage() }}
            </div>
          }

          <button
            type="submit"
            class="btn-submit"
            [disabled]="isLoading()"
          >
            @if (!isLoading()) {
              <span>Send Reset Code</span>
            } @else {
              <span class="btn-loader">
                <span class="loader-dot"></span>
                <span class="loader-dot"></span>
                <span class="loader-dot"></span>
              </span>
            }
          </button>
        </form>
      } @else {
        <!-- Success state -->
        <div class="success-container" [@fadeSlide]>
          <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <p class="success-text">{{ successMessage() }}</p>
          <button class="btn-submit" type="button" (click)="goToResetPassword()">
            Enter Reset Code
          </button>
        </div>
      }
    </div>
  </div>
</div>
